<!DOCTYPE html>
<html>
<head>
    <title>Meri Jaan ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
            text-align: center;
        }

        /* Stars Background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: transparent url("https://www.transparenttextures.com/patterns/stardust.png");
            animation: moveStars 60s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveStars {
            from { transform: translate(0,0); }
            to { transform: translate(-500px,-500px); }
        }

        .container {
            max-width: 750px;
            padding: 20px;
            z-index: 2;
            animation: fadeIn 3s ease-in-out;
        }

        h1 {
            font-size: 44px;
            margin-bottom: 20px;
            animation: glow 2s infinite alternate;
        }

        h1 span {
            display: inline-block;
            animation: heartbeat 1.5s infinite;
        }

        p {
            font-size: 22px;
            line-height: 1.7;
            min-height: 180px;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #ff4d6d; }
            to { text-shadow: 0 0 30px #ff4d6d; }
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .heart {
            position: absolute;
            color: #ff4d6d;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .footer {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Meri Jaan <span>❤️</span></h1>
    <p id="message"></p>
    <div class="footer">Forever Yours 💞</div>
</div>

<script>
const text = `Happy Monthesary, meri jaan... ❤️

Even with miles between us, my heart beats only for you.

You are my peace in chaos,
my warmth in cold nights,
my comfort when everything feels heavy.

Every second without you feels incomplete,
but every day brings us one step closer
to holding each other again.

I don't just love you...
I choose you.
Today. Tomorrow. Always. 💖`;

let i = 0;
const speed = 35;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += 
            text.charAt(i) === "\n" ? "<br><br>" : text.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

typeWriter();

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 15 + "px";
    heart.style.animationDuration = Math.random() * 3 + 4 + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}

setInterval(createHeart, 400);
</script>

</body>
</html>
