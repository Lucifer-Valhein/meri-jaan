<!DOCTYPE html>
<html>
<head>
    <title>Meri Jaan ❤️</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

            <style>
                    body {
                                margin: 0;
                                            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
                                                        display: flex;
                                                                    justify-content: center;
                                                                                align-items: center;
                                                                                            height: 100vh;
                                                                                                        font-family: 'Segoe UI', sans-serif;
                                                                                                                    color: white;
                                                                                                                                overflow: hidden;
                                                                                                                                            text-align: center;
                                                                                                                                                    }

                                                                                                                                                            .container {
                                                                                                                                                                        max-width: 700px;
                                                                                                                                                                                    padding: 20px;
                                                                                                                                                                                            }

                                                                                                                                                                                                    h1 {
                                                                                                                                                                                                                font-size: 42px;
                                                                                                                                                                                                                            margin-bottom: 20px;
                                                                                                                                                                                                                                        animation: glow 2s infinite alternate;
                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                        p {
                                                                                                                                                                                                                                                                    font-size: 22px;
                                                                                                                                                                                                                                                                                line-height: 1.6;
                                                                                                                                                                                                                                                                                            min-height: 150px;
                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                            @keyframes glow {
                                                                                                                                                                                                                                                                                                                        from { text-shadow: 0 0 10px #ff4d6d; }
                                                                                                                                                                                                                                                                                                                                    to { text-shadow: 0 0 25px #ff4d6d; }
                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                    .heart {
                                                                                                                                                                                                                                                                                                                                                                position: absolute;
                                                                                                                                                                                                                                                                                                                                                                            color: #ff4d6d;
                                                                                                                                                                                                                                                                                                                                                                                        font-size: 20px;
                                                                                                                                                                                                                                                                                                                                                                                                    animation: float 6s linear infinite;
                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                    @keyframes float {
                                                                                                                                                                                                                                                                                                                                                                                                                                0% { transform: translateY(100vh); opacity: 1; }
                                                                                                                                                                                                                                                                                                                                                                                                                                            100% { transform: translateY(-10vh); opacity: 0; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        </head>

                                                                                                                                                                                                                                                                                                                                                                                                                                                        <body>

                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="container">
                                                                                                                                                                                                                                                                                                                                                                                                                                                            <h1>Meri Jaan ❤️</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                <p id="message"></p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const text = "Happy Monthesary, my love.\n\nEven with miles between us, my heart has never felt closer to yours.\n\nYou are my peace, my comfort, my favorite forever.\n\nEvery day apart is one day closer to holding you again.";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let i = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const speed = 40;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function typeWriter() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (i < text.length) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("message").innerHTML += 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    text.charAt(i) === "\n" ? "<br><br>" : text.charAt(i);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                i++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            setTimeout(typeWriter, speed);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            typeWriter();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Floating hearts
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function createHeart() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const heart = document.createElement("div");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    heart.className = "heart";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            heart.innerHTML = "❤️";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    heart.style.left = Math.random() * 100 + "vw";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            heart.style.fontSize = Math.random() * 20 + 15 + "px";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    heart.style.animationDuration = Math.random() * 3 + 4 + "s";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.body.appendChild(heart);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    setTimeout(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                heart.remove();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }, 6000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                setInterval(createHeart, 500);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
